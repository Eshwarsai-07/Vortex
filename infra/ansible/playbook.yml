---
- hosts: kafka_node
  become: true
  vars:
    project_dir: "/home/ubuntu/Vortex"

  tasks:
    - name: Install dependencies
      apt:
        name:
          - docker.io
          - docker-compose
          - git
        state: present
        update_cache: yes

    - name: Add user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Clone project repo
      git:
        repo: "https://github.com/Eshwarsai-07/Vortex.git"
        dest: "{{ project_dir }}"
        version: "main"

    - name: Start Docker Compose stack
      shell: docker-compose up -d
      args:
        chdir: "{{ project_dir }}/services"
