---
- name: Ensure target project directory exists with correct permissions
  ansible.builtin.file:
    path: "{{ project_directory }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Clone or pull the Vortex source code repository
  ansible.builtin.git:
    repo: "{{ repository_url }}"
    dest: "{{ project_directory }}"
    version: "{{ repository_branch }}"
    force: yes
    accept_hostkey: yes
  become: false # Run as ubuntu user to preserve home directory ownership
...
