---
- name: Wait for backend container (vortex-app) to report healthy status
  ansible.builtin.command:
    cmd: "docker inspect --format='{%raw%}{{.State.Health.Status}}{%endraw%}' vortex-app"
  register: container_health_status
  until: container_health_status.stdout == "healthy"
  retries: 12
  delay: 10
  changed_when: false
  # Loops for up to 2 minutes, checking every 10 seconds until the node container is fully initialized and healthy.

- name: Run docker compose ps to view container status
  ansible.builtin.command:
    cmd: docker compose -f {{ docker_compose_file }} ps
  register: docker_compose_ps_out
  changed_when: false

- name: Output container status for deployment log auditing
  ansible.builtin.debug:
    var: docker_compose_ps_out.stdout_lines

- name: Fail if any container is not running or is unhealthy
  ansible.builtin.assert:
    that:
      - "'Exit' not in docker_compose_ps_out.stdout"
      - "'unhealthy' not in docker_compose_ps_out.stdout"
    fail_msg: "One or more containers failed to start or are unhealthy! Status: {{ docker_compose_ps_out.stdout }}"

- name: Verify backend health endpoint is online
  ansible.builtin.uri:
    url: "{{ health_endpoint }}"
    status_code: 200
  register: health_check
  until: health_check.status == 200
  retries: 6
  delay: 10

- name: Verify vortex-build-server image exists on host
  ansible.builtin.command:
    cmd: docker image inspect vortex-build-server:latest
  changed_when: false
...
