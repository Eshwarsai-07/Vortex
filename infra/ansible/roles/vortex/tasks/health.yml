---
- name: Wait for services to initialize
  ansible.builtin.pause:
    seconds: 15

- name: Check that all Docker containers are running
  ansible.builtin.command:
    cmd: docker compose -f {{ docker_compose_file }} ps --format json
  register: docker_ps_json
  changed_when: false
  failed_when: "'exited' in docker_ps_json.stdout or 'dead' in docker_ps_json.stdout"

- name: Verify backend health endpoint is online
  ansible.builtin.uri:
    url: "{{ health_endpoint }}"
    status_code: 200
  register: health_check
  until: health_check.status == 200
  retries: 6
  delay: 10
...
