name: Continuous Deployment (CD)

on:
  push:
    branches: [ main, master ]

jobs:
  deploy-to-ec2:
    name: Deploy to AWS EC2 Host
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "Starting Vortex EC2 Deployment..."
            
            # Navigate to application workspace directory
            if [ ! -d "$HOME/Vortex" ]; then
              git clone https://github.com/${{ github.repository }}.git $HOME/Vortex
            fi
            
            cd $HOME/Vortex
            git fetch --all
            git reset --hard origin/main

            # Create default environment file if missing
            if [ ! -f ".env" ]; then
              echo "PORT=5000" > .env
              echo "MONGO_URI=mongodb://mongodb:27017/vortex" >> .env
              echo "KAFKA_BROKER=kafka-1:19092" >> .env
              echo "KAFKA_TOPIC=build-logs" >> .env
              echo "CLICKHOUSE_HOST=clickhouse" >> .env
              echo "S3_BUCKET=eshwar-vortex-storage" >> .env
              echo "AWS_REGION=eu-north-1" >> .env
            fi
            
            # Run container deployments with sudo
            cd services
            sudo docker compose down --remove-orphans || true
            sudo docker compose up -d --build
            
            # Verify Deployment Health
            echo "Waiting for services to become healthy..."
            sleep 20
            curl -f http://localhost:5000/health || (echo "Health check failed!" && exit 1)
            echo "Vortex Deployment Successfully Verified!"
